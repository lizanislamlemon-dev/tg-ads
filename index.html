<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App - Secured Ads</title>
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Monetag SDK -->
    <script src='//libtl.com/sdk.js' data-zone='11361400' data-sdk='show_11361400'></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .user-info {
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .user-info h3 {
            margin: 0 0 5px 0;
            color: var(--tg-theme-button-color, #2481cc);
        }

        .tg-id {
            font-size: 12px;
            color: gray;
            margin-bottom: 15px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .btn:disabled {
            background-color: #cccccc !important;
            color: #666666 !important;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: #28a745;
            color: #ffffff;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ব্যবহারকারীর তথ্য ও ইউনিক টেলিগ্রাম আইডি -->
        <div class="user-info">
            <h3 id="welcome-msg">স্বাগতম!</h3>
            <div class="tg-id">ID: <span id="user-id">Loading...</span></div>
            <p>আপনার ব্যালেন্স: <span id="balance">০</span> পয়েন্ট</p>
        </div>

        <!-- বিজ্ঞাপন বাটনসমূহ -->
        <button id="ri-btn" class="btn" onclick="startAdTimer('ri')">Rewarded Interstitial দেখুন</button>
        <button id="rp-btn" class="btn btn-secondary" onclick="startAdTimer('pop')">Rewarded Popup দেখুন</button>

        <div class="footer">
            Monetag Secured Integration v2
        </div>
    </div>

    <script>
        // টেলিগ্রাম ওয়েব অ্যাপ ইনিশিয়ালাইজেশন
        const tele = window.Telegram.WebApp;
        tele.ready();
        tele.expand();

        // টেলিগ্রাম ইউজার আইডি এবং নাম প্রদর্শন
        const user = tele.initDataUnsafe?.user;
        if (user) {
            document.getElementById('welcome-msg').innerText = `হ্যালো, ${user.first_name || 'ইউজার'}!`;
            document.getElementById('user-id').innerText = user.id; // টেলিগ্রাম আইডি
        } else {
            document.getElementById('user-id').innerText = "টেলিগ্রামের বাইরে থেকে খেলছেন";
        }

        // লোকাল ব্যালেন্স ট্র্যাকিং
        let currentBalance = parseInt(localStorage.getItem('user_points')) || 0;
        document.getElementById('balance').innerText = currentBalance;

        function updateBalance(points) {
            currentBalance += points;
            localStorage.setItem('user_points', currentBalance);
            document.getElementById('balance').innerText = currentBalance;
        }

        // বিজ্ঞপ্তির স্থিতি ট্র্যাকিং
        let isAdRunning = false;

        // টাইমার ও অ্যাড হ্যান্ডলার ফাংশন (উভয় অ্যাডের জন্য এক লজিক)
        function startAdTimer(adType) {
            if (isAdRunning) return;

            const btn = adType === 'ri' ? document.getElementById('ri-btn') : document.getElementById('rp-btn');
            const originalText = btn.innerText;
            
            isAdRunning = true;
            btn.disabled = true;
            btn.innerText = "বিজ্ঞাপন লোড হচ্ছে...";

            // ১. মনিট্যাগ বিজ্ঞাপনটি ট্রিগার করা
            if (typeof show_11361400 === 'function') {
                
                // ইন্টারস্টিশিয়াল বা পপআপ ট্রিম করা
                const adPromise = adType === 'ri' ? show_11361400() : show_11361400('pop');

                adPromise.then(() => {
                    console.log("Ad triggered successfully");
                }).catch(e => {
                    console.error("Ad loading error", e);
                });

                // ২. বাটনে ১৫ সেকেন্ডের একটি কাউন্টডাউন শুরু করা (এটি নিশ্চিত করবে ইউজার ব্যাক বাটনে চাপলেও টাইমার শেষ না হওয়া পর্যন্ত পয়েন্ট পাবে না)
                let timeLeft = 15; // ১৫ সেকেন্ডের টাইমার
                btn.innerText = `অপেক্ষা করুন (${timeLeft}s)`;

                const countdown = setInterval(() => {
                    timeLeft--;
                    btn.innerText = `অপেক্ষা করুন (${timeLeft}s)`;

                    if (timeLeft <= 0) {
                        clearInterval(countdown);
                        
                        // নির্দিষ্ট রিওয়ার্ড যোগ করা
                        const rewardPoints = adType === 'ri' ? 10 : 15;
                        updateBalance(rewardPoints);
                        alert(`অভিনন্দন! আপনি ${rewardPoints} পয়েন্ট পেয়েছেন।`);
                        
                        // বাটন স্বাভাবিক অবস্থায় ফিরিয়ে আনা
                        isAdRunning = false;
                        btn.disabled = false;
                        btn.innerText = originalText;
                    }
                }, 1000);

            } else {
                alert('বিজ্ঞাপন সার্ভিস এখন উপলব্ধ নয়।');
                isAdRunning = false;
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        // ৩. In-App Interstitial (ব্যাকগ্রাউন্ড অটো-অ্যাড)
        window.addEventListener('load', () => {
            if (typeof show_11361400 === 'function') {
                show_11361400({
                    type: 'inApp',
                    inAppSettings: {
                        frequency: 2,
                        capping: 0.1,
                        interval: 30,
                        timeout: 5,
                        everyPage: false
                    }
                });
            }
        });
    </script>
</body>
</html>
