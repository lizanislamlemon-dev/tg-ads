<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App - Single Ad IP Lock</title>
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Monetag SDK -->
    <script src='//libtl.com/sdk.js' data-zone='11361400' data-sdk='show_11361400'></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .user-info {
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .user-info h3 {
            margin: 0 0 5px 0;
            color: var(--tg-theme-button-color, #2481cc);
        }

        .tg-id {
            font-size: 11px;
            color: gray;
            margin-bottom: 5px;
        }

        .ip-info {
            font-size: 11px;
            color: #d9534f;
            margin-bottom: 10px;
        }

        .limit-info {
            font-size: 14px;
            font-weight: bold;
            color: #28a745;
            margin-bottom: 15px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .btn:disabled {
            background-color: #cccccc !important;
            color: #666666 !important;
            cursor: not-allowed;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ব্যবহারকারীর তথ্য ও আইপি -->
        <div class="user-info">
            <h3 id="welcome-msg">স্বাগতম!</h3>
            <div class="tg-id">ID: <span id="user-id">Loading...</span></div>
            <div class="ip-info">IP: <span id="user-ip">Verifying...</span></div>
            <p>আপনার ব্যালেন্স: <span id="balance">০</span> পয়েন্ট</p>
        </div>

        <!-- দৈনিক লিমিট ট্র্যাকার -->
        <div id="limit-text" class="limit-info">
            আজকের বিজ্ঞাপন বাকি আছে: Loading...
        </div>

        <!-- শুধুমাত্র একটি বিজ্ঞাপন বাটন -->
        <button id="ri-btn" class="btn" disabled onclick="startAdProcess()">Verifying Device...</button>

        <div class="footer">
            Monetag Anti-Cheat System v5
        </div>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.ready();
        tele.expand();

        // ব্যবহারকারী তথ্য লোড
        const user = tele.initDataUnsafe?.user;
        if (user) {
            document.getElementById('welcome-msg').innerText = `হ্যালো, ${user.first_name || 'ইউজার'}!`;
            document.getElementById('user-id').innerText = user.id;
        } else {
            document.getElementById('user-id').innerText = "Browser Test Mode";
        }

        // ব্যালেন্স ডাটা লোড
        let currentBalance = parseInt(localStorage.getItem('user_points')) || 0;
        document.getElementById('balance').innerText = currentBalance;

        function updateBalance(points) {
            currentBalance += points;
            localStorage.setItem('user_points', currentBalance);
            document.getElementById('balance').innerText = currentBalance;
        }

        // আইপি ট্র্যাকিং
        let userIP = "unknown";
        const COOLDOWN_TIME = 60; // ১ মিনিট কুলডাউন

        // পাবলিক আইপি লোড করা
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => {
                userIP = data.ip;
                document.getElementById('user-ip').innerText = userIP;
                initializeSystem();
            })
            .catch(err => {
                console.error("IP Fetch failed", err);
                document.getElementById('user-ip').innerText = "Failed to verify IP";
                userIP = "fallback_" + (user ? user.id : "guest");
                initializeSystem();
            });

        function getTodayDate() {
            const today = new Date();
            return today.getFullYear() + '-' + (today.getMonth() + 1) + '-' + today.getDate();
        }

        // আইপি-ভিত্তিক ডেইলি লিমিট চেক (সর্বোচ্চ ২০ বার)
        function getDailyCount() {
            const savedDate = localStorage.getItem(`ad_date_${userIP}`);
            const today = getTodayDate();
            
            if (savedDate !== today) {
                localStorage.setItem(`ad_date_${userIP}`, today);
                localStorage.setItem(`ad_count_${userIP}`, '0');
                return 0;
            }
            return parseInt(localStorage.getItem(`ad_count_${userIP}`)) || 0;
        }

        function incrementDailyCount() {
            let count = getDailyCount();
            count++;
            localStorage.setItem(`ad_count_${userIP}`, count.toString());
            updateLimitUI();
        }

        function updateLimitUI() {
            const remaining = 20 - getDailyCount();
            document.getElementById('limit-text').innerText = `আজকের বিজ্ঞাপন বাকি আছে: ${remaining}/২০`;
        }

        function initializeSystem() {
            updateLimitUI();
            checkGlobalCooldown();
        }

        // --- বিজ্ঞাপন প্রসেসিং লজিক ---
        let isAdRunning = false;

        // আইপি-ভিত্তিক গ্লোবাল কুলডাউন চেক
        function checkGlobalCooldown() {
            const lastAdTime = parseInt(localStorage.getItem(`last_ad_time_${userIP}`)) || 0;
            const now = Date.now();
            const timeDiff = Math.floor((now - lastAdTime) / 1000);

            if (timeDiff < COOLDOWN_TIME) {
                const remainingCooldown = COOLDOWN_TIME - timeDiff;
                startCooldownCountdown(remainingCooldown);
            } else {
                resetButton();
            }
        }

        function startAdProcess() {
            if (isAdRunning) return;

            // ডেইলি লিমিট চেক (সর্বোচ্চ ২০ বার)
            if (getDailyCount() >= 20) {
                alert("এই ডিভাইস/আইপি থেকে আজকের ২০টি বিজ্ঞাপনের লিমিট শেষ হয়ে গেছে। আগামীকাল আবার চেষ্টা করুন।");
                return;
            }

            const riBtn = document.getElementById('ri-btn');
            
            isAdRunning = true;
            riBtn.disabled = true;
            riBtn.innerText = "বিজ্ঞাপন লোড হচ্ছে...";

            // বিজ্ঞাপন শো করা
            if (typeof show_11361400 === 'function') {
                
                show_11361400().then(() => {
                    console.log("Ad rendered");
                }).catch(e => {
                    console.error("Ad fail", e);
                });

                // ১৫ সেকেন্ডের ওয়াচ টাইমার
                let timeLeft = 15;
                riBtn.innerText = `অপেক্ষা করুন (${timeLeft}s)`;

                const watchInterval = setInterval(() => {
                    timeLeft--;
                    riBtn.innerText = `অপেক্ষা করুন (${timeLeft}s)`;

                    if (timeLeft <= 0) {
                        clearInterval(watchInterval);
                        
                        const rewardPoints = 10; // প্রতিটি বিজ্ঞাপনের জন্য ১০ পয়েন্ট
                        updateBalance(rewardPoints);
                        incrementDailyCount(); // লিমিট বাড়ানো হলো
                        
                        localStorage.setItem(`last_ad_time_${userIP}`, Date.now().toString());
                        
                        alert(`অভিনন্দন! আপনি ১০ পয়েন্ট পেয়েছেন। পরবর্তী বিজ্ঞাপনের জন্য ১ মিনিট অপেক্ষা করুন।`);
                        
                        startCooldownCountdown(COOLDOWN_TIME);
                    }
                }, 1000);

            } else {
                alert('বিজ্ঞাপন সার্ভিস এখন উপলব্ধ নয়।');
                resetButton();
            }
        }

        // ১ মিনিটের কুলডাউন কাউন্টডাউন
        function startCooldownCountdown(seconds) {
            isAdRunning = true;
            const riBtn = document.getElementById('ri-btn');
            riBtn.disabled = true;

            let remainingTime = seconds;
            riBtn.innerText = `পরবর্তী টাস্ক (${remainingTime}s)`;

            const cooldownInterval = setInterval(() => {
                remainingTime--;
                riBtn.innerText = `পরবর্তী টাস্ক (${remainingTime}s)`;

                if (remainingTime <= 0) {
                    clearInterval(cooldownInterval);
                    resetButton();
                }
            }, 1000);
        }

        // বাটন রিসেট করা
        function resetButton() {
            isAdRunning = false;
            const riBtn = document.getElementById('ri-btn');

            riBtn.disabled = false;
            riBtn.innerText = "Rewarded Interstitial দেখুন";

            // লিমিট শেষ হলে বাটন স্থায়ীভাবে লক করা হবে
            if (getDailyCount() >= 20) {
                riBtn.disabled = true;
                riBtn.innerText = "আজকের লিমিট শেষ";
            }
        }
    </script>
</body>
</html>
