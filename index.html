<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App - Secured Monetag Ads</title>
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Monetag SDK -->
    <script src='//libtl.com/sdk.js' data-zone='11361400' data-sdk='show_11361400'></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .user-info {
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .user-info h3 {
            margin: 0 0 10px 0;
            color: var(--tg-theme-button-color, #2481cc);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .btn:disabled {
            background-color: #cccccc !important;
            color: #666666 !important;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: #28a745;
            color: #ffffff;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ব্যবহারকারীর তথ্য -->
        <div class="user-info">
            <h3 id="welcome-msg">স্বাগতম!</h3>
            <p>আপনার ব্যালেন্স: <span id="balance">০</span> পয়েন্ট</p>
        </div>

        <!-- বিজ্ঞাপন বাটনসমূহ -->
        <button id="ri-btn" class="btn" onclick="showRewardedInterstitial()">Rewarded Interstitial দেখুন</button>
        <button id="rp-btn" class="btn btn-secondary" onclick="showRewardedPopup()">Rewarded Popup দেখুন</button>

        <div class="footer">
            Monetag Secured Ad Integration
        </div>
    </div>

    <script>
        // টেলিগ্রাম ওয়েব অ্যাপ ইনিশিয়ালাইজেশন
        const tele = window.Telegram.WebApp;
        tele.ready();
        tele.expand();

        // ব্যবহারকারীর নাম সেট করা
        const user = tele.initDataUnsafe?.user;
        if (user) {
            document.getElementById('welcome-msg').innerText = `হ্যালো, ${user.first_name || 'ইউজার'}!`;
        }

        // ব্যালেন্স ট্র্যাকিং
        let currentBalance = parseInt(localStorage.getItem('user_points')) || 0;
        document.getElementById('balance').innerText = currentBalance;

        function updateBalance(points) {
            currentBalance += points;
            localStorage.setItem('user_points', currentBalance);
            document.getElementById('balance').innerText = currentBalance;
        }

        // বিজ্ঞপ্তির স্থিতি ট্র্যাকিং ভেরিয়েবল
        let isAdActive = false;

        // ১. Secured Rewarded Interstitial
        function showRewardedInterstitial() {
            if (isAdActive) return;

            const btn = document.getElementById('ri-btn');
            isAdActive = true;
            btn.disabled = true;
            btn.innerText = "বিজ্ঞাপন লোড হচ্ছে...";

            // বিজ্ঞাপন চালু করার সময় রেকর্ড করা হচ্ছে
            const startTime = Date.now();

            if (typeof show_11361400 === 'function') {
                show_11361400().then(() => {
                    const endTime = Date.now();
                    const secondsWatched = (endTime - startTime) / 1000;

                    // যদি ইউজার ১৫ সেকেন্ডের কম সময় বিজ্ঞাপনটি স্ক্রিনে রাখে
                    if (secondsWatched < 15) {
                        alert('আপনি বিজ্ঞাপনটি খুব দ্রুত বন্ধ করে দিয়েছেন। পয়েন্ট পেতে অন্তত ১৫ সেকেন্ড বিজ্ঞাপনটি স্ক্রিনে রাখুন।');
                    } else {
                        updateBalance(10); // সফলভাবে দেখলে ১০ পয়েন্ট
                        alert('অভিনন্দন! আপনি ১০ পয়েন্ট পেয়েছেন।');
                    }
                    
                    resetButton(btn, "Rewarded Interstitial দেখুন");
                }).catch(err => {
                    console.error('Ad failed to load:', err);
                    alert('বিজ্ঞাপনটি লোড করা যায়নি। আবার চেষ্টা করুন।');
                    resetButton(btn, "Rewarded Interstitial দেখুন");
                });
            } else {
                alert('বিজ্ঞাপন সার্ভিস এখন উপলব্ধ নয়।');
                resetButton(btn, "Rewarded Interstitial দেখুন");
            }
        }

        // ২. Secured Rewarded Popup
        function showRewardedPopup() {
            if (isAdActive) return;

            const btn = document.getElementById('rp-btn');
            isAdActive = true;
            btn.disabled = true;
            btn.innerText = "বিজ্ঞাপন লোড হচ্ছে...";

            // বিজ্ঞাপন চালু করার সময় রেকর্ড করা হচ্ছে
            const startTime = Date.now();

            if (typeof show_11361400 === 'function') {
                show_11361400('pop').then(() => {
                    const endTime = Date.now();
                    const secondsWatched = (endTime - startTime) / 1000;

                    // যদি ইউজার ১৫ সেকেন্ডের কম সময় বিজ্ঞাপনটি স্ক্রিনে রাখে
                    if (secondsWatched < 15) {
                        alert('আপনি বিজ্ঞাপনটি খুব দ্রুত বন্ধ করে দিয়েছেন। পয়েন্ট পেতে অন্তত ১৫ সেকেন্ড বিজ্ঞাপনটি স্ক্রিনে রাখুন।');
                    } else {
                        updateBalance(15); // সফলভাবে দেখলে ১৫ পয়েন্ট
                        alert('অভিনন্দন! আপনি ১৫ পয়েন্ট পেয়েছেন।');
                    }

                    resetButton(btn, "Rewarded Popup দেখুন");
                }).catch(e => {
                    console.error('Error playing popup ad:', e);
                    resetButton(btn, "Rewarded Popup দেখুন");
                });
            } else {
                alert('বিজ্ঞাপন সার্ভিস এখন উপলব্ধ নয়।');
                resetButton(btn, "Rewarded Popup দেখুন");
            }
        }

        // বাটন সচল করার হেল্পার ফাংশন
        function resetButton(buttonElement, originalText) {
            isAdActive = false;
            buttonElement.disabled = false;
            buttonElement.innerText = originalText;
        }

        // ৩. In-App Interstitial (ব্যাকগ্রাউন্ডে স্বয়ংক্রিয়ভাবে চলবে)
        window.addEventListener('load', () => {
            if (typeof show_11361400 === 'function') {
                show_11361400({
                    type: 'inApp',
                    inAppSettings: {
                        frequency: 2,
                        capping: 0.1,
                        interval: 30,
                        timeout: 5,
                        everyPage: false
                    }
                });
            }
        });
    </script>
</body>
</html>
