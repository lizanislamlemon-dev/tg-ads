<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App - Secured Monetag Ads</title>
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Monetag SDK -->
    <script src='//libtl.com/sdk.js' data-zone='11361400' data-sdk='show_11361400'></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .user-info {
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .user-info h3 {
            margin: 0 0 5px 0;
            color: var(--tg-theme-button-color, #2481cc);
        }

        .tg-id {
            font-size: 12px;
            color: gray;
            margin-bottom: 10px;
        }

        .limit-info {
            font-size: 14px;
            font-weight: bold;
            color: #d9534f;
            margin-bottom: 15px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .btn:disabled {
            background-color: #cccccc !important;
            color: #666666 !important;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: #28a745;
            color: #ffffff;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ব্যবহারকারীর তথ্য ও আইডি -->
        <div class="user-info">
            <h3 id="welcome-msg">স্বাগতম!</h3>
            <div class="tg-id">ID: <span id="user-id">Loading...</span></div>
            <p>আপনার ব্যালেন্স: <span id="balance">০</span> পয়েন্ট</p>
        </div>

        <!-- দৈনিক বিজ্ঞাপনের লিমিট ট্র্যাকার -->
        <div class="limit-info">
            আজকের বিজ্ঞাপন বাকি আছে: <span id="ad-limit">২০/২০</span>
        </div>

        <!-- বিজ্ঞাপন বাটনসমূহ -->
        <button id="ri-btn" class="btn" onclick="startAdProcess('ri')">Rewarded Interstitial দেখুন</button>
        <button id="rp-btn" class="btn btn-secondary" onclick="startAdProcess('pop')">Rewarded Popup দেখুন</button>

        <div class="footer">
            Monetag Secured System v3
        </div>
    </div>

    <script>
        // টেলিগ্রাম ওয়েব অ্যাপ ইনিশিয়ালাইজেশন
        const tele = window.Telegram.WebApp;
        tele.ready();
        tele.expand();

        // ব্যবহারকারী তথ্য লোড
        const user = tele.initDataUnsafe?.user;
        if (user) {
            document.getElementById('welcome-msg').innerText = `হ্যালো, ${user.first_name || 'ইউজার'}!`;
            document.getElementById('user-id').innerText = user.id;
        } else {
            document.getElementById('user-id').innerText = "Browser Test Mode";
        }

        // ব্যালেন্স ডাটা লোড
        let currentBalance = parseInt(localStorage.getItem('user_points')) || 0;
        document.getElementById('balance').innerText = currentBalance;

        function updateBalance(points) {
            currentBalance += points;
            localStorage.setItem('user_points', currentBalance);
            document.getElementById('balance').innerText = currentBalance;
        }

        // --- দৈনিক লিমিট ট্র্যাকিং (আজকের তারিখ অনুযায়ী) ---
        function getTodayDate() {
            const today = new Date();
            return today.getFullYear() + '-' + (today.getMonth() + 1) + '-' + today.getDate();
        }

        function getDailyCount() {
            const savedDate = localStorage.getItem('ad_date');
            const today = getTodayDate();
            
            if (savedDate !== today) {
                // নতুন দিন শুরু হলে কাউন্টার ০ করে দেওয়া হচ্ছে
                localStorage.setItem('ad_date', today);
                localStorage.setItem('ad_count', '0');
                return 0;
            }
            return parseInt(localStorage.getItem('ad_count')) || 0;
        }

        function incrementDailyCount() {
            let count = getDailyCount();
            count++;
            localStorage.setItem('ad_count', count.toString());
            updateLimitUI();
        }

        function updateLimitUI() {
            const remaining = 20 - getDailyCount();
            document.getElementById('ad-limit').innerText = `${remaining}/২০`;
        }

        // পেজ লোড হবার সময় লিমিট UI আপডেট করা
        updateLimitUI();

        // --- বিজ্ঞাপন প্রসেসিং এবং টাইমার লজিক ---
        let isAdRunning = false;
        const COOLDOWN_TIME = 60; // ১ মিনিট = ৬০ সেকেন্ড

        // ১ মিনিটের কুলডাউন টাইমার চেক করা (পেজ রিফ্রেশ দিলেও এটি ব্যাকআপ রাখবে)
        function checkGlobalCooldown() {
            const lastAdTime = parseInt(localStorage.getItem('last_ad_time')) || 0;
            const now = Date.now();
            const timeDiff = Math.floor((now - lastAdTime) / 1000);

            if (timeDiff < COOLDOWN_TIME) {
                const remainingCooldown = COOLDOWN_TIME - timeDiff;
                startCooldownCountdown(remainingCooldown);
            }
        }

        function startAdProcess(adType) {
            if (isAdRunning) return;

            // দৈনিক লিমিট চেক (সর্বোচ্চ ২০ বার)
            if (getDailyCount() >= 20) {
                alert("আজকের জন্য আপনার ২০টি বিজ্ঞাপনের লিমিট শেষ হয়ে গেছে। আগামীকাল আবার চেষ্টা করুন।");
                return;
            }

            const riBtn = document.getElementById('ri-btn');
            const rpBtn = document.getElementById('rp-btn');
            const targetBtn = adType === 'ri' ? riBtn : rpBtn;
            
            isAdRunning = true;
            riBtn.disabled = true;
            rpBtn.disabled = true;
            targetBtn.innerText = "বিজ্ঞাপন লোড হচ্ছে...";

            // বিজ্ঞাপন চালু করা
            if (typeof show_11361400 === 'function') {
                
                const adPromise = adType === 'ri' ? show_11361400() : show_11361400('pop');

                adPromise.then(() => {
                    console.log("Ad opened successfully");
                }).catch(e => {
                    console.error("Ad error", e);
                });

                // ১৫ সেকেন্ডের ওয়াচ টাইমার
                let timeLeft = 15;
                targetBtn.innerText = `অপেক্ষা করুন (${timeLeft}s)`;

                const watchInterval = setInterval(() => {
                    timeLeft--;
                    targetBtn.innerText = `অপেক্ষা করুন (${timeLeft}s)`;

                    if (timeLeft <= 0) {
                        clearInterval(watchInterval);
                        
                        // রিওয়ার্ড কয়েন যোগ করা
                        const rewardPoints = adType === 'ri' ? 10 : 15;
                        updateBalance(rewardPoints);
                        incrementDailyCount(); // লিমিট ১ বাড়ানো হলো
                        
                        // লাস্ট দেখার সময় রেকর্ড করা হচ্ছে কুলডাউনের জন্য
                        localStorage.setItem('last_ad_time', Date.now().toString());
                        
                        alert(`অভিনন্দন! আপনি ${rewardPoints} পয়েন্ট পেয়েছেন। পরবর্তী বিজ্ঞাপনের জন্য ১ মিনিট অপেক্ষা করুন।`);
                        
                        // ১ মিনিটের কুলডাউন শুরু করা
                        startCooldownCountdown(COOLDOWN_TIME);
                    }
                }, 1000);

            } else {
                alert('বিজ্ঞাপন সার্ভিস এখন উপলব্ধ নয়।');
                resetAllButtons();
            }
        }

        // ১ মিনিটের কুলডাউন কাউন্টডাউন
        function startCooldownCountdown(seconds) {
            isAdRunning = true;
            const riBtn = document.getElementById('ri-btn');
            const rpBtn = document.getElementById('rp-btn');

            riBtn.disabled = true;
            rpBtn.disabled = true;

            let remainingTime = seconds;
            riBtn.innerText = `পরবর্তী বিজ্ঞাপন (${remainingTime}s)`;
            rpBtn.innerText = `পরবর্তী বিজ্ঞাপন (${remainingTime}s)`;

            const cooldownInterval = setInterval(() => {
                remainingTime--;
                riBtn.innerText = `পরবর্তী বিজ্ঞাপন (${remainingTime}s)`;
                rpBtn.innerText = `পরবর্তী বিজ্ঞাপন (${remainingTime}s)`;

                if (remainingTime <= 0) {
                    clearInterval(cooldownInterval);
                    resetAllButtons();
                }
            }, 1000);
        }

        // বাটনগুলোকে আবার সচল করা
        function resetAllButtons() {
            isAdRunning = false;
            
            const riBtn = document.getElementById('ri-btn');
            const rpBtn = document.getElementById('rp-btn');

            riBtn.disabled = false;
            rpBtn.disabled = false;

            riBtn.innerText = "Rewarded Interstitial দেখুন";
            rpBtn.innerText = "Rewarded Popup দেখুন";

            // যদি অলরেডি লিমিট শেষ হয়ে থাকে তবে লকডই থাকবে
            if (getDailyCount() >= 20) {
                riBtn.disabled = true;
                rpBtn.disabled = true;
                riBtn.innerText = "আজকের লিমিট শেষ";
                rpBtn.innerText = "আজকের লিমিট শেষ";
            }
        }

        // পেজ ওপেন হওয়ার সাথে সাথে কোনো একটিভ কুলডাউন আছে কিনা তা চেক করা
        checkGlobalCooldown();
    </script>
</body>
</html>
